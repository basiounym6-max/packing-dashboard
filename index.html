<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Final QC & Packing Performance Dashboard</title>

  <link rel="stylesheet" href="style.css">

  <!-- CHART JS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

  <!-- HEADER -->
  <header class="header">

    <div class="logo-box">
      <img src="logo.png" class="logo">
    </div>

    <h1>UPGRADE</h1>

    <div class="logo-box">
      <img src="logo.png" class="logo">
    </div>

  </header>


  <!-- CARDS -->
  <section class="cards-section">

    <div class="top-card">
      <h3>TOTAL PASS</h3>
      <p id="passCount">0</p>
    </div>

    <div class="top-card">
      <h3>TOTAL DEVICES</h3>
      <p id="totalCount">0</p>
    </div>

    <div class="top-card reject-card">
      <h3>TOTAL REJECT</h3>
      <p id="rejectCount">0</p>
    </div>

  </section>



  <!-- FILTERS -->
  <section class="filters-section">

    <!-- YEAR -->
    <select id="yearFilter" onchange="applyFilters()">

      <option value="">Year</option>

      <option value="2024">2024</option>
      <option value="2025">2025</option>
      <option value="2026">2026</option>

    </select>


    <!-- MONTH -->
    <select id="monthFilter" onchange="applyFilters()">

      <option value="">Month</option>

      <option value="Jan">Jan</option>
      <option value="Feb">Feb</option>
      <option value="Mar">Mar</option>
      <option value="Apr">Apr</option>
      <option value="May">May</option>
      <option value="Jun">Jun</option>
      <option value="Jul">Jul</option>
      <option value="Aug">Aug</option>
      <option value="Sep">Sep</option>
      <option value="Oct">Oct</option>
      <option value="Nov">Nov</option>
      <option value="Dec">Dec</option>

    </select>


    <!-- QC -->
    <select id="qcFilter" onchange="applyFilters()">

      <option value="">QC</option>

      <option value="Fady">Fady</option>
      <option value="Samir">Samir</option>
      <option value="Hatem">Hatem</option>
      <option value="Hossam">Hossam</option>
      <option value="A.Lotfy">A.Lotfy</option>

    </select>


    <!-- PACKING -->
    <select id="packingFilter" onchange="applyFilters()">

      <option value="">Packing</option>

      <option value="Ehab Sadar">Ehab Sadar</option>
      <option value="M.elsayed">M.elsayed</option>
      <option value="M.Basiuony">M.Basiuony</option>

    </select>


    <!-- SEARCH -->
    <input type="text"
           id="searchBox"
           placeholder="Search..."
           onkeyup="applyFilters()">

  </section>



  <!-- CHARTS -->
  <section class="charts-grid">

    <!-- PASS VS REJECT -->
    <div class="chart-card small-card">

      <h3>Pass VS Reject</h3>

      <canvas id="statusChart"></canvas>

    </div>



    <!-- REJECT -->
    <div class="chart-card medium-card">

      <h3>Reject Categories</h3>

      <canvas id="rejectChart"></canvas>

    </div>



    <!-- QC -->
    <div class="chart-card large-card">

      <h3>QC Performance</h3>

      <canvas id="qcChart"></canvas>

    </div>

  </section>



  <!-- TABLE -->
  <section class="table-section">

    <table>

      <thead>

        <tr>

          <th>Job Number</th>
          <th>Date</th>
          <th>Status</th>
          <th>QC Name</th>
          <th>Inspection By</th>
          <th>Category</th>

        </tr>

      </thead>

      <tbody>

      </tbody>

    </table>

  </section>



  <!-- SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
